name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0). Required for manual runs."
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build (windows)
    runs-on: windows-latest
    env:
      ASSET_NAME: aiscrub-windows-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: false

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dev environment (PyInstaller)
        run: uv sync --extra build

      - name: Build binary with PyInstaller
        shell: bash
        run: |
          uv run pyinstaller \
            --onefile \
            --name aiscrub \
            --console \
            aiscrub.py

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p staging
          cp dist/aiscrub.exe staging/aiscrub.exe
          cp README.md staging/ 2>/dev/null || true
          cp LICENSE staging/ 2>/dev/null || true

      - name: Zip asset
        shell: pwsh
        run: Compress-Archive -Path staging\* -DestinationPath ${env:ASSET_NAME}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_NAME }}
          path: ${{ env.ASSET_NAME }}.zip
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Compute checksums
        run: |
          cd artifacts
          find . -name "*.zip" -exec sha256sum {} \; | sed 's|\./[^/]*/||' > ../SHA256SUMS.txt
          cat ../SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          body: |
            Windows binary release. Source is available in this repository — see
            the README for build-from-source instructions on other platforms.
          files: |
            artifacts/**/*.zip
            SHA256SUMS.txt
